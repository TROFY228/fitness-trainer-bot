name: Фитнес-тренер бот

on:
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch:

jobs:
  send_fitness_reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Генерируем сообщение
        id: message
        run: |
          DAY_NUM=$(date +%u)
          PROJECT_NAME=$(jq -r '.project_name' config.json)
          WATER_GOAL=$(jq -r '.water_goal_liters' config.json)
          
          DAYS=("monday" "tuesday" "wednesday" "thursday" "friday" "saturday" "sunday")
          TODAY_KEY=${DAYS[$((DAY_NUM-1))]}
          
          WORKOUTS=$(jq -r ".workouts.$TODAY_KEY[]" config.json 2>/dev/null | sed 's/^/• /' | tr '\n' '\\n')
          
          MOTIVATION=$(jq -r '.motivational_phrases[0]' config.json)
          
          MESSAGE="*🏋️ ${PROJECT_NAME}*

          📅 *Сегодня:* $(date +%d.%m.%Y)

          💧 *Вода:* цель ${WATER_GOAL} л

          📋 *Тренировка на сегодня:*
          ${WORKOUTS}

          ✨ ${MOTIVATION}"
          
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}" \
            -d parse_mode="Markdown"

      - name: Сохраняем историю
        run: |
          TIMESTAMP=$(date -Iseconds)
          jq --arg ts "$TIMESTAMP" '.last_run = $ts' data.json > tmp.json && mv tmp.json data.json
          
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data.json
          git commit -m "Auto update: $TIMESTAMP" || echo "No changes"
          git push || echo "Nothing to push"
